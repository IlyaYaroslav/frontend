@if (floatLabel()) {
  <p-floatlabel variant="on">
    <ng-container [ngTemplateOutlet]="control"></ng-container>
    <label [for]="id()">{{ label() }}</label>
  </p-floatlabel>
} @else {
  @if (label()) {
    <label [for]="id()" class="input-label">{{ label() }}</label>
  }
  
  <ng-container [ngTemplateOutlet]="control"></ng-container>
}

<ng-template #control>
  @if (type() === 'text' || type() === 'email') {
    <p-iconfield>
      <input
        pInputText
        class="input"
        [pSize]="size()"
        [class.p-invalid]="showError()"
        [id]="id()"
        [type]="type()"
        [formField]="field()"
        [autocomplete]="autocomplete()"
        [placeholder]="placeholder()"
        [attr.aria-invalid]="showError()"
        [attr.aria-describedby]="showError() ? id() + '-error' : null"
      />

      @if (value() && clear()) {
        <p-inputicon
          role="button"
          tabindex="0"
          [attr.aria-label]="'Удалить текст'"
          title="Удалить текст"
          (click)="clearValue()"
          style="cursor: pointer">
          <app-icon name="close" [size]="16" />
        </p-inputicon>
      }
    </p-iconfield>
  }

  @if (type() === 'password') {
    <p-iconfield>
      <input
        pInputText
        class="input"
        [pSize]="size()"
        [class.p-invalid]="showError()"
        [id]="id()"
        [type]="passwordInputType()"
        [formField]="field()"
        [autocomplete]="autocomplete()"
        [placeholder]="placeholder()"
        [attr.aria-invalid]="showError()"
        [attr.aria-describedby]="showError() ? id() + '-error' : null"
      />

      <p-inputicon
        role="button"
        tabindex="0"
        [attr.aria-label]="mask() ? 'Показать пароль' : 'Скрыть пароль'"
        [title]="mask() ? 'Показать пароль' : 'Скрыть пароль'"
        (click)="toggleMask()"
        (keydown.enter)="toggleMask()"
        (keydown.space)="toggleMask()"
        style="cursor: pointer"
      >
        <app-icon [name]="mask() ? 'show' : 'hide'" [size]="16" />
      </p-inputicon>
    </p-iconfield>
  }

</ng-template>

@if (showError()) {
  <p-message
    styleClass="input-error-message"
    [attr.id]="id() + '-error'"
    severity="error"
    variant="simple"
    size="small">
    {{ errorMessage() }}
  </p-message>
}
