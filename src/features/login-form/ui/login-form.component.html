<form class="login-form" (submit)="onSubmit($event)">
  <fieldset class="login-inputs">
    <app-input-string
      [id]="'register-email'"
      [label]="'E-mail'"
      [autocomplete]="'email'"
      [field]="loginForm.email"
      [submitted]="submitted()" />

    <app-input-string
      [id]="'register-password'"
      [label]="'Пароль'"
      [type]="'password'"
      [autocomplete]="'new-password'"
      [field]="loginForm.password"
      [submitted]="submitted()" />
  </fieldset>
  <fieldset class="form-actions">
    <button
      type="submit"
      class="submit-btn"
      title="Войти"
      pButton
      raised
      severity="contrast"
      >
      @if (loading()) {
        Вход... <app-icon [name]="'loader'" class="animate-spin"/>
      } @else {
        Войти
      }
    </button>
  </fieldset>
</form>
