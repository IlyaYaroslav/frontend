<p-toggleswitch
  class="theme-toggle-switch"
  [ngModel]="isDarkTheme()"
  (ngModelChange)="toggleTheme()"
  ariaLabel="Переключить тему"
  [pt]="togglePt"
>
  <ng-template #handle let-checked="checked">
    <span
      class="theme-toggle-switch__icon"
      [class.theme-toggle-switch__icon--moon]="checked"
      [class.theme-toggle-switch__icon--sun]="!checked"
      aria-hidden="true"
    >
      <app-icon [name]="checked ? 'moon' : 'sun'" [size]="16" />
    </span>
  </ng-template>
</p-toggleswitch>
