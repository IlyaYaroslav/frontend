<form class="register-form dark:bg-surface-800/30" (submit)="onSubmit($event)">
  <fieldset class="register-inputs">
    <app-input-string
      [id]="'register-login'"
      [label]="'Логин'"
      [placeholder]="'Введите логин'"
      [autocomplete]="'username'"
      [field]="registerForm.login"
      [submitted]="submitted()" />

    <app-input-string
      [id]="'register-password'"
      [label]="'Пароль'"
      [type]="'password'"
      [placeholder]="'Введите пароль'"
      [autocomplete]="'new-password'"
      [field]="registerForm.password"
      [passwordShowControl]="true"
      [submitted]="submitted()" />

    <app-input-string
      [id]="'register-confirm-password'"
      [label]="'Повторите пароль'"
      [type]="'password'"
      [placeholder]="'Повторите пароль'"
      [autocomplete]="'new-password'"
      [field]="registerForm.confirmPassword"
      [passwordShowControl]="true"
      [submitted]="submitted()" />
  </fieldset>
  <fieldset class="submit-btn">
    <button
      type="submit"
      class="btn preset-outlined-surface-300-700"
      [title]="'Зарегистрироваться'"
      [disabled]="registerForm().submitting()">Зарегистрироваться
    </button>
  </fieldset>
</form>
