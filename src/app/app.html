<p-toast position="top-right" />

<app-header
  [isDarkTheme]="isDarkTheme()"
  (themeToggled)="toggleTheme()"
  (sidebarOpen)="openSidebar()"
/>

<main class="app-main">
  <router-outlet />
</main>

@if (isAuthenticated()) {
  <app-sidebar
    [visible]="sidebarVisible()"
    (visibleChange)="setSidebarVisible($event)"
  />
}
