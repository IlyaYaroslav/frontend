<header class="header dark:bg-surface-800/30">
  <div class="container">
    <div class="header__inner">
      <a routerLink="/" class="font-bold text-xl">
        Task Space
      </a>

      <nav class="header__nav">
        <ul>
          @for (link of headerNav; track link.label) {
            <li>
              <a
                class="header__link"
                [routerLink]="link.routerLink"
                [routerLinkActive]="'header__link-active'">{{ link.label }}</a>
            </li>
          }
        </ul>
      </nav>

      <app-theme-toggle />

      <a class="header__user" routerLink="/user">
        <div class="header__user-icon">
          <app-icon [name]="'user'" [size]="25" />
        </div>
      </a>
    </div>
  </div>
</header>
