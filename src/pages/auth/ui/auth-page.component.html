<app-auth-layout>
  <section class="auth-card">
    <p-tabs [value]="mode()" class="auth-tabs">
      <p-tablist>
        <p-tab value="login" routerLink="/login">
          Вход
        </p-tab>

        <p-tab value="register" routerLink="/register">
          Регистрация
        </p-tab>
      </p-tablist>
    </p-tabs>
    
    @if (mode() === 'login') {
      <app-login-form />
    } @else {
      <app-register-form />
    }
  </section>
</app-auth-layout>
