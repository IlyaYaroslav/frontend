name: Frontend CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        shell: bash
        run: |
          if find src -type f \( -name "*.spec.ts" -o -name "*.test.ts" \) | grep -q .; then
            npm test -- --watch=false
          else
            echo "No test files found, skipping test step."
          fi

      - name: Upload production build
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: dist/frontend/browser
          if-no-files-found: error

  docker:
    name: Validate Docker image
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: frontend:${{ github.sha }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    env:
      SSH_HOST: ${{ secrets.VPS_HOST }}
      SSH_USER: ${{ secrets.VPS_USER }}
      SSH_PORT: ${{ secrets.VPS_PORT }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
      DEPLOY_PATH: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST secret is required}"
          : "${SSH_USER:?SSH_USER secret is required}"
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          SSH_PORT="${SSH_PORT:-22}"
          echo "SSH_PORT=$SSH_PORT" >> "$GITHUB_ENV"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload application
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            -czf "$RUNNER_TEMP/frontend.tar.gz" .

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "$SSH_PORT" "$RUNNER_TEMP/frontend.tar.gz" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/frontend.tar.gz"

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$DEPLOY_PATH'
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            docker network create taskspace-net 2>/dev/null || true
            docker compose up -d --build --remove-orphans frontend
          "
