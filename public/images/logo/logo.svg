<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Task Space Favicon</title>
  <desc id="desc">A simplified owl favicon for Task Space without the smile underline.</desc>

  <defs>
    <linearGradient id="orbitGradient" x1="6" y1="8" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="50%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#63E6BE"/>
    </linearGradient>

    <linearGradient id="owlStroke" x1="14" y1="10" x2="48" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="50%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#63E6BE"/>
    </linearGradient>

    <linearGradient id="owlFill" x1="18" y1="12" x2="42" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
  </defs>

  <!-- orbit -->
  <ellipse cx="30" cy="32" rx="25" ry="12" transform="rotate(-24 30 32)"
    stroke="url(#orbitGradient)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>

  <!-- orbit accents -->
  <circle cx="9" cy="42" r="2.5" fill="#63E6BE"/>
  <circle cx="47" cy="8.5" r="3" fill="#7C5CFF"/>
  <path d="M50 39H57" stroke="#63E6BE" stroke-width="3" stroke-linecap="round"/>

  <!-- ears -->
  <path d="M22 18L17.5 11.5C16.6 10.3 18.1 8.9 19.5 9.7L26.5 14.5L22 18Z"
    fill="#111827" stroke="url(#owlStroke)" stroke-width="2"/>
  <path d="M38 18L42.5 11.5C43.4 10.3 41.9 8.9 40.5 9.7L33.5 14.5L38 18Z"
    fill="#111827" stroke="url(#owlStroke)" stroke-width="2"/>

  <!-- owl head/body -->
  <path d="M30 14C19.6 14 12.5 22.1 12.5 33.3C12.5 45.8 20.4 54 30 54C39.6 54 47.5 45.8 47.5 33.3C47.5 22.1 40.4 14 30 14Z"
    fill="url(#owlFill)" stroke="url(#owlStroke)" stroke-width="2.5"/>

  <!-- eyes -->
  <circle cx="23.5" cy="29" r="6.5" fill="#F8FAFC"/>
  <circle cx="36.5" cy="29" r="6.5" fill="#F8FAFC"/>
  <circle cx="23.5" cy="29" r="2.7" fill="#111827"/>
  <circle cx="36.5" cy="29" r="2.7" fill="#111827"/>
  <circle cx="24.6" cy="27.9" r="1" fill="#FFFFFF"/>
  <circle cx="37.6" cy="27.9" r="1" fill="#FFFFFF"/>

  <!-- beak -->
  <path d="M30 35L26.8 39H33.2L30 35Z" fill="#63E6BE"/>
</svg>
